name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  fast:
    name: Fast build and tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Build converter
        run: make convert

      - name: Run fast tests
        run: make test-fast

      - name: Smoke-test svfdrive converter path
        run: head -c 4096 /dev/zero | ./convert svfdrive 0.45 0.55 0.45 0.25 - /tmp/svfdrive.raw
